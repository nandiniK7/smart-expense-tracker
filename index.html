<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Expense Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Income Expense Calculator</h1>

<div class="summary">
<h3>Total Income: ₹<span id="income">0</span></h3>
<h3>Total Expense: ₹<span id="expense">0</span></h3>
<h2>Balance: ₹<span id="balance">0</span></h2>
</div>

<div class="form">

<input type="text" id="description" placeholder="Description">

<input type="number" id="amount" placeholder="Amount">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<button onclick="addTransaction()">Add</button>
<button onclick="resetForm()">Reset</button>

</div>

<div class="filters">

<label><input type="radio" name="filter" value="all" checked onclick="filterTransactions()"> All</label>

<label><input type="radio" name="filter" value="income" onclick="filterTransactions()"> Income</label>

<label><input type="radio" name="filter" value="expense" onclick="filterTransactions()"> Expense</label>

</div>

<ul id="list"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
